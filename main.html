<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>glazocode — Divine relay console</title>
  <style>
    :root{
      --bg0:#070b14;
      --bg1:#0f1730;
      --panel:#121a33;
      --ink:#eef2ff;
      --muted:#a7b0d6;
      --accent:#7cf0d6;
      --accent2:#8aa7ff;
      --warn:#ffb86b;
      --danger:#ff6b84;
      --line:#273055;
      --shadow:0 22px 60px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(900px 600px at 15% 0%, rgba(122,240,214,.12), transparent 55%),
        radial-gradient(900px 700px at 90% 10%, rgba(138,167,255,.12), transparent 55%),
        linear-gradient(180deg,var(--bg1),var(--bg0));
      min-height:100vh;
    }
    header{
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(10px);
      background:rgba(8,12,24,.72);
      position:sticky;
      top:0;
      z-index:5;
    }
    .wrap{max-width:1220px;margin:0 auto;padding:22px}
    h1{margin:0;font-weight:750;letter-spacing:.02em}
    p.lead{margin:8px 0 0;color:var(--muted);max-width:920px;line-height:1.55}
    .pillrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:6px 12px;border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      color:var(--muted);font-size:12px;
    }
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-top:18px}
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      box-shadow:var(--shadow);
    }
    .card h2{margin:0 0 10px;font-size:16px}
    label{display:block;font-size:12px;color:var(--muted);margin:10px 0 6px}
    input,textarea,select{
      width:100%;
      padding:11px 12px;
      border-radius:14px;
